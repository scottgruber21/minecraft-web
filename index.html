<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1f2937" />
    <title>Minecraft Places</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card hero-card">
        <h1>Minecraft Places</h1>
        <p>Track the places you have visited in Minecraft, including coordinate details, notes, and site type.</p>
      </section>

      <section class="card form-card">
        <h2>Add a place</h2>
        <form id="place-form">
          <label>
            Name
            <input id="name" name="name" type="text" placeholder="The Overworld Base" required />
          </label>

          <div class="coordinate-grid">
            <label>
              X
              <input id="x" name="x" type="number" step="any" placeholder="120" required />
            </label>
                        <label>
              Z
              <input id="z" name="z" type="number" step="any" placeholder="-340" />
            </label>
            <label>
              Y
              <input id="y" name="y" type="number" step="any" placeholder="64" required />
            </label>

          </div>

          <label>
            Notes
            <textarea id="notes" name="notes" rows="4" placeholder="Describe what you found or why it mattered"></textarea>
          </label>

          <label>
            Type
            <select id="type" name="type">
              <option value="House">House</option>
              <option value="Village">Village</option>
              <option value="Cave">Cave</option>
              <option value="Portal">Portal</option>
              <option value="Misc">Misc</option>
            </select>
          </label>

          <button type="submit">Save place</button>
        </form>
      </section>

      <section class="card search-card">
        <h2>Find nearby places</h2>
        <div class="coordinate-grid">
          <label>
            Current X
            <input id="search-x" name="search-x" type="number" step="any" placeholder="0" />
          </label>
                    <label>
            Current Z
            <input id="search-z" name="search-z" type="number" step="any" placeholder="0" />
          </label>
          <label>
            Current Y
            <input id="search-y" name="search-y" type="number" step="any" placeholder="64" />
          </label>
        </div>
        <button id="search-btn" class="secondary" type="button">Find nearby</button>
        <div id="search-results" class="search-results"></div>
      </section>

      <section class="card list-card">
        <div class="list-header">
          <h2>Saved places</h2>
          <button id="clear-all" class="secondary">Clear all</button>
        </div>
        <div id="empty-state" class="empty-state">No places saved yet. Add your first Minecraft location.</div>
        <ul id="place-list" class="place-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
